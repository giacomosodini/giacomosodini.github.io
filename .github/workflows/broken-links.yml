name: Check for broken links

on:
  push:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"
  pull_request:
    branches:
      - master
      - main
    paths:
      - "assets/**"
      - "**.html"
      - "**.js"
      - "**.liquid"
      - "**/*.md"
      - "**.yml"
      - "!.github/workflows/axe.yml"
      - "!.github/workflows/prettier.yml"
      - "!lighthouse_results/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  link-checker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v2.8.0
        with:
          fail: true
          # v0.24.2 ships lychee's binary nested inside a subdirectory in its release tarball, which
          # this action's install script (even in v2.8.0) doesn't handle; v0.23.0 is the last version
          # with the flat tarball layout the action expects, and it already supports --root-dir
          lycheeVersion: v0.23.0
          # removed md files that include liquid tags
          # --root-dir resolves root-relative links (e.g. /assets/..., /publications/) against the
          # repo root, since Jekyll pages use permalinks that don't match their source file location
          # --exclude-path skips docs that are excluded from the Jekyll build itself (see _config.yml)
          # and are therefore never rendered on the live site
          # --exclude skips domains that consistently block non-browser user agents (false positives)
          args: --root-dir "${{ github.workspace }}" --max-retries 3 --retry-wait-time 5 --user-agent 'curl/7.54' --exclude-path README.md --exclude-path FAQ.md --exclude-path INSTALL.md --exclude-path _pages/404.md --exclude-path _pages/blog.md --exclude-path _pages/about_einstein.md --exclude-path _posts/2018-12-22-distill.md --exclude-path _posts/2023-04-24-videos.md --exclude-path _books/the_godfather.md --exclude 'mimuw\.edu\.pl' --exclude 'cirm-math\.fr' --exclude 'intmath\.com' --exclude 'alshedivat/al-folio' --exclude 'ceda\.polimi\.it' --exclude 'unsplash\.com' --exclude 'birs\.ca' --exclude 'univie\.ac\.at' --verbose --no-progress './**/*.md' './**/*.html'
