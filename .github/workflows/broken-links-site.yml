name: Check for broken links on site

on:
  workflow_run:
    workflows: [Deploy site]
    types: [completed]

permissions:
  actions: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  check-links-on-site:
    # https://docs.github.com/en/actions/using-workflows/events-that-trigger-workflows#running-a-workflow-based-on-the-conclusion-of-another-workflow
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # available images: https://github.com/actions/runner-images#available-images
    runs-on: ubuntu-latest
    steps:
      - name: Download built site 📦
        uses: actions/download-artifact@v4
        with:
          name: site
          path: _site
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
      - name: Link Checker 🔗
        uses: lycheeverse/lychee-action@v2.1.0
        with:
          fail: true
          # only check local links
          # --root-dir resolves root-relative links (e.g. /research/, /assets/...) against the built
          # site's own root, matching how a browser would resolve them
          # excluded paths are unmodified al-folio template demo content (redirect/advanced-images
          # demo posts, sample book review) that reference placeholder assets never added to the site
          args: --root-dir "$GITHUB_WORKSPACE/_site" --offline --remap '_site(/?.*)/assets/(.*) _site/assets/$2' --exclude-path _site/blog/2022 --exclude-path _site/blog/2024/advanced-images --exclude-path _site/books/the_godfather --verbose --no-progress '_site/**/*.html'
