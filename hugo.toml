baseURL = "https://gokarna-hugo.netlify.app"
title = "Giacomo Enrico Sodini"
theme = "gokarna"
languageCode = "en"
defaultContentLanguage = "en"
enableEmoji = true
enableRobotsTXT = true

# Choose one of emacs, trac or perldoc
pygmentsStyle = "monokai"

[params]
  footer = "Giacomo Enrico Sodini"
  description = "I am a University Assistant (Post-Doc) in the group of Ulisse Stefanelli at University of Vienna."
  avatarURL = "/images/avatar.webp"
  AvatarAltText = "avatar"
  avatarSize = "size-m"
  customHeadHTML = """
    <!-- KaTeX -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.css" integrity="sha384-Xi8rHCmBmhbuyyhbI88391ZKP2dmfnOl4rT9ZfRI7mLTdk1wblIUnrIq35nqwEvC" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/katex.min.js" integrity="sha384-X/XCfMm41VSsqRNQgDerQczD69XqmjOOOwYQvr/uuC+j4OPoNhVgjdGFwhvN02Ja" crossorigin="anonymous"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.0/dist/contrib/auto-render.min.js" integrity="sha384-+XBljXPPiv+OzfbB3cVmLHf4hdUFHlWNZN5spNQ7rmHTXpd7WvJum6fIACpNNfIR" crossorigin="anonymous"></script>
    <script>
      document.addEventListener("DOMContentLoaded", function() {
        renderMathInElement(document.body, {
          // customised options
          // • auto-render specific keys, e.g.:
          delimiters: [
            {left: '$$', right: '$$', display: true},
            {left: '$', right: '$', display: false},
          ],
          // • rendering keys, e.g.:
          throwOnError : false
        });
      });
    </script>
  """
  socialIcons = [
    {name = "arxiv", url = "https://arxiv.org/a/sodini_g_1.html"},
    {name = "scholar", url = "https://scholar.google.com/citations?user=TxwgVk0AAAAJ&hl=it&oi=ao"},
    {name = "researchgate", url = "https://www.researchgate.net/profile/Giacomo-Sodini"},
{name = "orcid", url = "https://orcid.org/0000-0001-9806-3576"},
{name = "gmail", url = "mailto:sodini.giacomo@gmail.com"},
    {name = "email", url = "mailto:giacomo.sodini@univie.ac.at"}
  ]
  metaKeywords = ["blog", "gokarna", "hugo"]

