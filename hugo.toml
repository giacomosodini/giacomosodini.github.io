  [[menu.main]]
    name = "Publications"
    pre = "<span data-feather='book'></span>"
    url = "/projects/"
    weight = 3

  [[menu.main]]
    name = "Talks"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 4

  [[menu.main]]
    name = "Teaching"
    pre = "<span data-feather='tag'></span>"
    url = "/tags/"
    weight = 4


